services:
  - type: web
    name: christ-embassy-kumasi1
    runtime: node
    region: oregon
    plan: starter
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@10.0.0 --activate && pnpm install --frozen-lockfile && PORT=3000 BASE_PATH=/ pnpm --filter @workspace/church-portal build && pnpm --filter @workspace/api-server build
    startCommand: node api-server/dist/index.mjs
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: church-db
          property: connectionString

databases:
  - name: church-db
    plan: free
    region: oregon
    databaseName: church_portal
    user: church_admin
